# YAML-formatted lists of agent and skill repositories.
# Supported formats:
#   GitHub issue:      https://github.com/{owner}/{repo}/issues/{number}
#   Azure DevOps file: https://dev.azure.com/{org}/{project}/_git/{repo}?path={path}&version=GB{branch}
